<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Attendance Log — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0f14;--card:#161b24;--border:#252d3d;--accent:#3b82f6;--text:#e2e8f0;--muted:#64748b;--font:'Space Grotesk',sans-serif;--success:#10b981;--danger:#ef4444}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh}
    nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
    .brand{font-size:1.05rem;font-weight:700}.brand span{color:var(--accent)}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:.875rem}
    .container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;flex-wrap:wrap;gap:1rem}
    h1{font-size:1.4rem;font-weight:700}
    .filter-form{display:flex;gap:.75rem;align-items:center}
    input[type=date]{padding:.55rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.875rem}
    .btn{padding:.55rem 1.25rem;border-radius:8px;border:none;background:var(--accent);color:#fff;font-family:var(--font);font-size:.875rem;font-weight:500;cursor:pointer;text-decoration:none;display:inline-block}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    th,td{padding:.75rem 1.25rem;text-align:left;border-bottom:1px solid var(--border);font-size:.875rem}
    th{color:var(--muted);font-weight:500;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}
    .badge{display:inline-block;padding:.25rem .65rem;border-radius:20px;font-size:.75rem;font-weight:700}
    .badge-in{background:rgba(16,185,129,.2);color:#6ee7b7}
    .badge-out{background:rgba(239,68,68,.2);color:#fca5a5}
    .empty{text-align:center;padding:3rem;color:var(--muted)}
    .back{color:var(--muted);text-decoration:none;font-size:.875rem;display:inline-flex;align-items:center;gap:.3rem;margin-bottom:1.5rem;transition:color .2s}.back:hover{color:var(--text)}
  </style>
</head>
<body>
<nav>
  <span class="brand">Finger<span>Attend</span> &mdash; Admin</span>
  <div class="nav-links"><a href="/admin/logout">Logout</a></div>
</nav>
<div class="container">
  <a href="/admin" class="back">← Dashboard</a>
  <div class="header">
    <h1>Attendance Log</h1>
    <form class="filter-form" method="GET">
      <input type="date" name="date" value="{{date_filter}}">
      <button class="btn" type="submit">Filter</button>
      <a href="/admin/export-attendance?date={{date_filter}}" class="btn btn-success" style="background:var(--success)">Export to Excel</a>
    </form>
  </div>
  <div class="card">
    <table>
      <thead>
        <tr><th>Name</th><th>Roll No</th><th>Action</th><th>Time</th><th>Date</th></tr>
      </thead>
      <tbody>
        {% for r in records %}
        <tr>
          <td><strong>{{r.student.name}}</strong></td>
          <td>{{r.student.roll_no}}</td>
          <td><span class="badge badge-{{r.action | lower}}">{{r.action}}</span></td>
          <td>{{r.timestamp.strftime('%H:%M:%S')}}</td>
          <td>{{r.date}}</td>
        </tr>
        {% else %}
        <tr><td colspan="5" class="empty">No records for {{date_filter}}</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
